        let currentCardIndex = 0;
        const flashcardElement = document.getElementById('flashcard');

        function renderCard() {
            flashcardElement.classList.remove('flipped');
            const card = cards[currentCardIndex];
            
            // Front
            document.getElementById('front-number').textContent = String(card.num).padStart(2, '0');
            document.getElementById('front-title').textContent = card.title;
            document.getElementById('front-author').textContent = card.author;
            document.getElementById('front-meta').textContent = `${card.genre} • ${card.date}`;
            document.getElementById('front-parcours').textContent = card.parcours;
            
            // Counter
            document.getElementById('card-counter').textContent = `${currentCardIndex + 1} / ${cards.length}`;
            
            // Back
            const backContentElement = document.getElementById('back-content');
            let mvtHTML = card.lineaire.map(m => `
                <div class="border-l-2 border-amber-500 pl-3 py-2 bg-slate-900/40 p-3 rounded-r-xl border-t border-b border-r border-slate-700/40">
                    <h4 class="font-bold text-[11px] text-amber-400 uppercase tracking-wider mb-1">${m.mvt}</h4>
                    <p class="text-xs text-slate-300 leading-relaxed text-justify">${m.desc}</p>
                </div>
            `).join('');

            backContentElement.innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2 bg-slate-900/60 p-2.5 rounded-xl border border-slate-700 text-[11px]">
                        <div><span class="text-amber-400 font-bold">Mouvement :</span> ${card.mouvement}</div>
                        <div><span class="text-amber-400 font-bold">Genre :</span> ${card.genre}</div>
                    </div>
                    <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-700/60">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Situation dans l'œuvre</span>
                        <p class="text-xs text-slate-300 leading-relaxed">${card.situation}</p>
                    </div>
                    <div class="bg-amber-500/10 p-3 rounded-xl border border-amber-500/20">
                        <span class="text-[10px] font-bold text-amber-400 uppercase tracking-widest block mb-1">Problématique</span>
                        <p class="text-xs font-bold text-amber-200 italic mb-2">« ${card.problematique} »</p>
                        <span class="text-[9px] font-bold text-slate-400 uppercase block mb-0.5">Réponse synthétique</span>
                        <p class="text-xs text-slate-300 leading-relaxed">${card.reponse_prob}</p>
                    </div>
                    <div class="space-y-2.5">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block pl-1">Analyse linéaire stylistique (Sans paraphrase)</span>
                        ${mvtHTML}
                    </div>
                    <div class="bg-emerald-500/10 p-3 rounded-xl border border-emerald-500/20">
                        <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-1">Ouverture</span>
                        <p class="text-xs text-emerald-300/90 leading-relaxed">${card.ouverture}</p>
                    </div>
                </div>
            `;
            
            document.getElementById('back-scroll-content').scrollTop = 0;
            if (window.lucide) window.lucide.createIcons();
        }

        function toggleFlip() { flashcardElement.classList.toggle('flipped'); }
        function nextCard() { currentCardIndex = (currentCardIndex + 1) % cards.length; renderCard(); }
        function prevCard() { currentCardIndex = (currentCardIndex - 1 + cards.length) % cards.length; renderCard(); }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextCard();
            else if (e.key === 'ArrowLeft') prevCard();
            else if (e.key === ' ') { e.preventDefault(); toggleFlip(); }
        });

        window.addEventListener('DOMContentLoaded', renderCard);
  </script>
