  <style>
        body { font-family: 'DM Sans', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }
        .flip-card { perspective: 1200px; }
        .flip-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back { backface-visibility: hidden; position: absolute; inset: 0; overflow-y: auto; }

        .flip-back::-webkit-scrollbar { width: 6px; }

    </style>

 </head>
 <body data-template-id="__page-root" class="min-h-screen flex flex-col items-center justify-center p-4 bg-slate-900 text-white">
  
  <header class="w-full max-w-4xl mb-4 text-center">
   <h1 data-template-id="main-title" class="canva-text heading-font text-3xl mb-1 text-amber-400">Analyses Linéaires</h1>
   <p data-template-id="subtitle" class="canva-text opacity-80 text-xs text-slate-400">Structure officielle de l'explication d'un texte à l'oral</p>
  </header>

  <main class="w-full max-w-4xl flex-1 flex flex-col items-center">
   <div id="card-counter" class="mb-3 text-xs font-medium opacity-70 bg-slate-800 px-3 py-1 rounded-full text-slate-300"></div>
   
   <div class="flip-card w-full cursor-pointer" id="flashcard" style="min-height: 520px;" onclick="toggleFlip()">
    <div class="flip-inner w-full h-full relative" style="min-height: 520px;">
     
     <div class="flip-front rounded-2xl shadow-xl p-8 flex flex-col items-center justify-center text-center border border-white/10" id="card-front" style="background: linear-gradient(135deg, #1e3a5f, #2d5a87);">
      <div id="front-number" class="text-7xl font-bold opacity-15 mb-2"></div>
      <div id="front-title" class="text-3xl font-bold mb-2 text-white heading-font"></div>
      <div id="front-author" class="text-xl font-medium text-amber-300 mb-1"></div>
      <div id="front-work" class="text-sm italic text-slate-300 mb-6"></div>
      <div id="front-parcours" class="text-xs px-4 py-1.5 rounded-full font-bold bg-white/10 text-slate-200 border border-white/10 tracking-wide uppercase"></div>
      <div class="mt-10 text-xs opacity-50 text-slate-300 flex items-center gap-1.5">
        <i data-lucide="refresh-cw" class="w-3 h-3"></i> Cliquez ou Espace pour ouvrir l'analyse
      </div>
     </div>
     
     <div class="flip-back rounded-2xl shadow-xl p-6 border border-slate-700 bg-slate-800 text-slate-100" id="card-back">
      <div id="back-content" class="space-y-4"></div>
      <div class="mt-6 border-t border-slate-700/60 pt-3 text-xs opacity-40 text-center flex items-center justify-center gap-1.5">
        <i data-lucide="refresh-cw" class="w-3 h-3"></i> Cliquez ou Espace pour retourner au titre
      </div>
     </div>

    </div>
   </div>
   
   <div class="flex items-center gap-4 mt-5">
    <button data-template-id="prev-btn" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 active:scale-95 transition rounded-lg font-medium text-sm flex items-center gap-2 border border-slate-700" onclick="event.stopPropagation(); prevCard();">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Précédent
    </button> 
    <button data-template-id="next-btn" class="px-5 py-2.5 bg-amber-500 hover:bg-amber-400 text-slate-900 active:scale-95 transition rounded-lg font-bold text-sm flex items-center gap-2" onclick="event.stopPropagation(); nextCard();">
      Suivant <i data-lucide="arrow-right" class="w-4 h-4"></i>
    </button>
   </div>

   <p class="text-xs opacity-40 mt-3 text-center hidden md:block text-slate-400">
     Astuce clavier : Flèches [◀] [▶] pour changer de texte | [Barre d'Espace] pour retourner la fiche
   </p>
  </main>

                intro: "Pamphlet humaniste rédigé par La Boétie durant sa jeunesse. L'auteur y pose une question révolutionnaire : pourquoi des millions d'hommes acceptent-ils d'obéir aveuglément à un seul tyran ?",
                problematique: "Comment La Boétie utilise-t-il la rhétorique de l'indignation pour bousculer le confort de ses lecteurs et dénoncer l'absurdité de la soumission ?", 
                lineaire: [
                    { mvt: "Mouvement 1 : L'accumulation de questions rhétoriques indignées", desc: "L'auteur bombarde le lecteur de questions pour souligner le paradoxe de la situation. Le polyptote 'obéir/servir' permet de distinguer la soumission forcée du consentement lâche." },
                    { mvt: "Mouvement 2 : L'apostrophe pathétique et provocatrice", desc: "Utilisation de formules dépréciatives en cascade ('Pauvres gens misérables', 'peuples insensés'). Cette provocation vise à piquer l'orgueil des opprimés pour les réveiller." },
                    { mvt: "Mouvement 3 : L'hypotypose des souffrances endurées", desc: "Tableau réaliste et violent de la spoliation quotidienne (vols des récoltes, enfants envoyés à la guerre). La Boétie montre que le peuple travaille activement à nourrir son propre bourreau." }
                ],
                conclusion: "Un texte fondateur qui déplace la faute : le problème n'est pas la force du tyran, mais la passivité et le consentement des sujets." 
            },
            { 
                num: 14, 
                title: "Discours de la servitude volontaire (Partie 2)", 
                author: "Étienne de La Boétie", 
                work: "Rédigé vers 1548", 
                parcours: "Défendre et entretenir la liberté",
                intro: "Dans la suite de son traité, La Boétie approfondit son analyse psychologique et politique en démontrant les mécanismes logiques de l'oppression auto-entretenue.",
                problematique: "Par quelle démonstration logique La Boétie prouve-t-il que le tyran n'a de pouvoir que celui que le peuple lui abandonne ?", 
                lineaire: [
                    { mvt: "Mouvement 1 : La déconstruction du pouvoir tyrannique", desc: "Anaphore interrogative montrant les limites physiques du tyran ('D'où a-t-il tant de yeux... si ce n'est de vos rangs ?'). Le tyran est ramené à sa condition de simple mortel démuni." },
                    { mvt: "Mouvement 2 : L'accusation de complicité (vocabulaire juridique)", desc: "Le peuple est qualifié de 'receleur' et de 'complice' de ses propres malheurs. Le parallélisme syntaxique 'vous [faites cela] afin qu'il [puisse vous détruire]' souligne la folie collective." },
                    { mvt: "Mouvement 3 : La gradation des violences subies", desc: "Énumération des exactions subies par le peuple ('épier, frapper, fouler'). Cette gradation logique vise à faire prendre conscience de la boucle d'oppression créée par la peur." }
                ],
                conclusion: "La Boétie réalise une démonstration scientifique du pouvoir : tout système tyrannique repose uniquement sur une pyramide de complicités inconscientes." 
            },
            { 
                num: 15, 
                title: "Discours de la servitude volontaire (Partie 3)", 
                author: "Étienne de La Boétie", 
                work: "Rédigé vers 1548", 
                parcours: "Défendre et entretenir la liberté",
                intro: "Dernière étape de la réflexion où La Boétie expose les ruses du pouvoir pour abrutir les masses (le *panem et circenses* romain) avant de proposer un remède inédit : la non-violence.",
                problematique: "Comment l'auteur analyse-t-il les stratégies de manipulation du pouvoir avant d'appeler à un sursaut pacifique ?", 
                lineaire: [
                    { mvt: "Mouvement 1 : L'exemple historique des Lydiens", desc: "La Boétie utilise un exemple de l'Antiquité pour illustrer sa thèse. Les théâtres, jeux et bordels sont qualifiés de 'drogueries du tyran', outils d'abrutissement programmés." },
                    { mvt: "Mouvement 2 : La comparaison avec le monde animal", desc: "Les hommes soumis sont comparés à des bêtes dociles que l'on flatte et apprivoise. Le lexique du piège montre la perte de la dignité et de la raison humaine." },
                    { mvt: "Mouvement 3 : L'exhortation finale et la métaphore du colosse", desc: "Formulation du concept de désobéissance civile ('Soyez résolus à ne plus servir, et vous voilà libres'). Le tyran est comparé à un grand colosse de terre dont il suffit de retirer la base pour qu'il s'effondre tout seul." }
                ],
                conclusion: "Un texte visionnaire qui refuse l'appel au sang ou à la révolution violente, affirmant que la liberté est un simple choix de conscience individuelle." 
            },
            { 
                num: 16, 
                title: "Le Loup et le Chien", 
                author: "Jean de La Fontaine", 
                work: "Fables, 1668", 
                parcours: "Défendre et entretenir la liberté",
                intro: "Fable célèbre ouvrant le premier recueil. Derrière le dialogue plaisant de deux animaux, La Fontaine propose un apologue philosophique percutant sur la condition de l'intellectuel et du citoyen face au pouvoir absolu.",
                problematique: "Comment le dialogue argumentatif entre le Loup et le Chien permet-il de mener un réquisitoire contre la soumission matérielle ?", 
                lineaire: [
                    { mvt: "Mouvement 1 : La rencontre et le contraste physique initial", desc: "Présentation des deux forces en présence. Le Loup est maigre, affamé mais libre ; le Chien est gras, puissant mais domestiqué. Les antithèses posent immédiatement les termes du dilemme éthique." },
                    { mvt: "Mouvement 2 : Le discours séducteur du Chien", desc: "Le Chien fait l'apologie de son confort matériel (nourriture facile, caresses du maître). Il utilise une rhétorique commerciale pour convaincre le Loup de renoncer à sa vie sauvage en échange de la sécurité." },
                    { mvt: "Mouvement 3 : La chute fulgurante et le refus du Loup", desc: "Le Loup remarque la marque pelée sur le cou du Chien : le 'collier'. Le rythme s'accélère par de courtes questions/réponses. Comprenant que le confort exige l'aliénation, le Loup s'enfuit. Sa fuite physique valide la supériorité de la liberté." }
                ],
                conclusion: "La Fontaine s'inscrit dans la lignée de La Boétie : la sécurité matérielle offerte par un maître n'est qu'un leurre doré qui ne vaudra jamais le prix de l'indépendance." 
            }
        ];

        let current = 0;

        function render() {
            const c = cards[current];
            document.getElementById('card-counter').textContent = `Fiche ${c.num} / ${cards.length}`;
            document.getElementById('front-number').textContent = c.num < 10 ? `0${c.num}` : c.num;
            document.getElementById('front-title').textContent = c.title;
            document.getElementById('front-author').textContent = c.author;
            document.getElementById('front-work').textContent = c.work;
            document.getElementById('front-parcours').textContent = c.parcours;

            const back = document.getElementById('back-content');
            
            // Génération dynamique des mouvements linéaires
            const itemsLineaires = c.lineaire.map(item => `
                <div class="bg-slate-900/40 p-3 rounded border border-slate-700/40">
                    <p class="font-bold text-amber-400 text-xs tracking-wider uppercase mb-1">${item.mvt}</p>
                    <p class="text-xs text-slate-200 leading-relaxed">${item.desc}</p>
                </div>
            `).join('');

            back.innerHTML = `
                <div class="border-b border-slate-700 pb-2">
                    <div class="flex justify-between items-start">
                        <h2 class="font-bold text-lg text-amber-400 heading-font">${c.title}</h2>
                        <span class="text-[10px] bg-slate-700 px-2 py-0.5 rounded text-slate-300 font-mono">U.N. ${c.num}</span>
                    </div>
                    <p class="text-xs italic text-slate-400">${c.author} — ${c.work}</p>
                </div>

                <div class="text-xs space-y-1">
                    <span class="font-bold text-slate-300 block uppercase tracking-wide text-[10px]">1. Introduction (Clé en main) :</span>
                    <p class="text-slate-300 bg-slate-700/30 p-2 rounded italic">${c.intro}</p>
                </div>

                <div class="text-xs space-y-1">
                    <span class="font-bold text-slate-300 block uppercase tracking-wide text-[10px]">2. Problématique :</span>
                    <p class="text-white font-medium pl-2 border-l-2 border-amber-500">${c.problematique}</p>
                </div>

                <div class="text-xs space-y-2">
                    <span class="font-bold text-slate-300 block uppercase tracking-wide text-[10px]">3. Analyse Linéaire (Texte ➔ Procédé ➔ Effet) :</span>
                    <div class="space-y-2">${itemsLineaires}</div>
                </div>

                <div class="text-xs space-y-1">
                    <span class="font-bold text-slate-300 block uppercase tracking-wide text-[10px]">4. Conclusion / Ouverture :</span>
                    <p class="text-slate-300 bg-slate-900/60 p-2 rounded">${c.conclusion}</p>
                </div>
            `;

            document.getElementById('flashcard').classList.remove('flipped');
        }

        function toggleFlip() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function nextCard() {
            current = (current + 1) % cards.length;
            render();
        }

        function prevCard() {
            current = (current - 1 + cards.length) % cards.length;
            render();
        }

        // Clavier
        document.addEventListener('keydown', function(event) {
            if (event.key === "ArrowRight") {
                nextCard();
            } else if (event.key === "ArrowLeft") {
                prevCard();
            } else if (event.key === " ") {
                event.preventDefault();
                toggleFlip();
            }
        });

        // Init
        render();
        lucide.createIcons();
  </script>
 </body>
</html>
